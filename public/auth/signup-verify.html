<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Updated | VIPs</title>
    <link rel="stylesheet" href="recovery.css">
</head>
<body>
    <main class="card">
        <h1>Signup is complete directly now</h1>
        <p class="sub">You do not need an OTP to create a VIPs account.</p>
        <a class="btn" id="signup-link" href="../worker/signup.html">Back to signup</a>
    </main>
    <script>
        const role = localStorage.getItem('userRole') || 'worker';
        const href = role === 'employer' ? '../employer/signup.html' : '../worker/signup.html';
        document.getElementById('signup-link').href = href;
        sessionStorage.removeItem('signupVerification');
        setTimeout(() => {
            window.location.replace(href);
        }, 1200);
    </script>
</body>
</html>
