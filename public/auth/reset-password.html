<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | VIPs</title>
    <link rel="stylesheet" href="recovery.css">
</head>
<body>
    <main class="shell">
        <div class="brand">VIPs</div>
        <section class="card">
            <h1>Create new password</h1>
            <p class="sub">Use a password you have not used before on this account.</p>
            <div class="meta" id="email-meta"></div>

            <form id="reset-form">
                <div class="field">
                    <label for="new-password">New password</label>
                    <input id="new-password" type="password" autocomplete="new-password" minlength="6" required>
                </div>
                <div class="field">
                    <label for="confirm-password">Confirm password</label>
                    <input id="confirm-password" type="password" autocomplete="new-password" minlength="6" required>
                </div>
                <button class="btn secondary" id="submit-btn" type="submit">Confirm</button>
            </form>

            <div class="status" id="status"></div>
        </section>
    </main>

    <script>
        const API_BASE = window.location.origin;
        const email = sessionStorage.getItem('recoveryEmail');
        const identifier = sessionStorage.getItem('recoveryIdentifier') || email;
        const maskedEmail = sessionStorage.getItem('recoveryMaskedEmail') || email;
        const code = sessionStorage.getItem('recoveryCode');
        const payload = JSON.parse(sessionStorage.getItem('recoveryPayload') || 'null');
        const statusEl = document.getElementById('status');
        const submitBtn = document.getElementById('submit-btn');

        if (!email || !payload?.resetToken) window.location.replace('forgot-password.html');
        document.getElementById('email-meta').textContent = maskedEmail || '';

        function setStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function saveSession(data) {
            localStorage.clear();
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username || '');
            localStorage.setItem('userRole', data.role);
            localStorage.setItem('userId', data.userId);
        }

        async function readApiResponse(res) {
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) return res.json();
            const text = await res.text();
            throw new Error(text.trim().startsWith('<')
                ? 'API route not found on this Render service. Make sure Render is running the Node server, not only a static site.'
                : text || 'Unexpected server response');
        }

        document.getElementById('reset-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword.length < 6) return setStatus('Password must be at least 6 characters.', 'error');
            if (newPassword !== confirmPassword) return setStatus('Passwords do not match.', 'error');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Changing password...';
            setStatus('');

            try {
                const res = await fetch(`${API_BASE}/api/auth/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        identifier,
                        code,
                        newPassword,
                        resetToken: payload.resetToken
                    })
                });
                const data = await readApiResponse(res);
                if (!res.ok) throw new Error(data.message || 'Password reset failed');

                saveSession(data);
                sessionStorage.removeItem('recoveryEmail');
                sessionStorage.removeItem('recoveryIdentifier');
                sessionStorage.removeItem('recoveryMaskedEmail');
                sessionStorage.removeItem('recoveryRole');
                sessionStorage.removeItem('recoveryCode');
                sessionStorage.removeItem('recoveryPayload');
                setStatus('Password changed. Opening your home page...', 'success');
                const redirect = data.redirect || (data.role === 'employer' ? '../employer/home.html' : '../worker/home.html');
                setTimeout(() => window.location.replace(redirect), 650);
            } catch (err) {
                setStatus(err.message || 'Password reset failed', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm';
            }
        });
    </script>
</body>
</html>
