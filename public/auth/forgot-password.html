<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VIPs</title>
    <link rel="stylesheet" href="recovery.css">
</head>
<body>
    <main class="shell">
        <div class="brand">VIPs</div>
        <section class="card">
            <h1>Find your account</h1>
            <p class="sub">Enter the Google email connected to your VIPs account. We will send a one-time password to that inbox.</p>

            <form id="otp-form">
                <div class="field">
                    <label for="email">Google email</label>
                    <input id="email" type="email" autocomplete="email" placeholder="name@gmail.com" required>
                </div>
                <button class="btn" id="submit-btn" type="submit">Get OTP</button>
            </form>

            <div class="status" id="status"></div>
            <a class="back" id="back-link" href="../worker/login.html">Back to login</a>
        </section>
    </main>

    <script>
        const API_BASE = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') === 'employer' ? 'employer' : 'worker';
        const backLink = document.getElementById('back-link');
        const statusEl = document.getElementById('status');
        const submitBtn = document.getElementById('submit-btn');

        backLink.href = role === 'employer' ? '../employer/login.html' : '../worker/login.html';

        function setStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        async function readApiResponse(res) {
            const contentType = res.headers.get('content-type') || '';
            if (contentType.includes('application/json')) return res.json();
            const text = await res.text();
            throw new Error(text.trim().startsWith('<')
                ? 'API route not found on this Render service. Make sure Render is running the Node server, not only a static site.'
                : text || 'Unexpected server response');
        }

        document.getElementById('otp-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending OTP...';
            setStatus('');

            try {
                const res = await fetch(`${API_BASE}/api/auth/forgot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, role })
                });
                const data = await readApiResponse(res);
                if (!res.ok) throw new Error(data.message || 'Could not send OTP');

                sessionStorage.setItem('recoveryEmail', email);
                sessionStorage.setItem('recoveryRole', data.role || role);
                setStatus('OTP sent. Opening verification...', 'success');
                setTimeout(() => {
                    window.location.href = `verify-otp.html?role=${encodeURIComponent(data.role || role)}`;
                }, 500);
            } catch (err) {
                setStatus(err.message || 'Could not send OTP', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Get OTP';
            }
        });
    </script>
</body>
</html>
