<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Services | Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --employer-blue: #3b82f6;
            --worker-green: #22c55e;
            --text-gray: #94a3b8;
            --gold-gradient: linear-gradient(45deg, #ffd700, #b8860b);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Dynamic background glow */
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.15), transparent 40%);
        }

        .welcome-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .header {
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out;
        }

        .vip-badge {
            background: var(--gold-gradient);
            color: black;
            padding: 6px 22px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 2px;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            margin: 0;
            letter-spacing: -1.5px;
            font-weight: 800;
        }

        .header p {
            color: var(--text-gray);
            font-size: 18px;
            margin-top: 15px;
            font-weight: 300;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            perspective: 1000px;
        }

        /* Glassmorphism Logic */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px) rotateX(5deg);
            background: rgba(255, 255, 255, 0.06);
        }

        .employer:hover { border-color: var(--employer-blue); box-shadow: 0 30px 60px rgba(59, 130, 246, 0.15); }
        .worker:hover { border-color: var(--worker-green); box-shadow: 0 30px 60px rgba(34, 197, 94, 0.15); }

        .icon-circle {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .employer:hover .icon-circle { background: var(--employer-blue); transform: scale(1.1) rotate(-10deg); }
        .worker:hover .icon-circle { background: var(--worker-green); transform: scale(1.1) rotate(10deg); }

        h3 { font-size: 24px; margin: 0 0 12px; font-weight: 600; }
        .card p { color: var(--text-gray); font-size: 14px; line-height: 1.6; margin-bottom: 35px; }

        .action-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-blue { background: var(--employer-blue); color: white; }
        .btn-green { background: var(--worker-green); color: white; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 700px) {
            .options { grid-template-columns: 1fr; gap: 20px; }
            body { overflow-y: auto; height: auto; padding: 60px 0; }
            .welcome-container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <div class="header">
        <div class="vip-badge">VIP Services</div>
        <h1>Elevate Your Potential</h1>
        <p>Choose your personalized experience below</p>
    </div>

    <div class="options">
        <div class="card employer" onclick="selectRole('employer')">
            <div class="icon-circle">ðŸ’¼</div>
            <h3>Employer</h3>
            <p>Access our elite workforce and manage large-scale projects with precision.</p>
            <button class="action-btn btn-blue">Continue as Employer</button>
        </div>

        <div class="card worker" onclick="selectRole('worker')">
            <div class="icon-circle">ðŸ‘¥</div>
            <h3>Worker</h3>
            <p>Showcase your expertise to high-end clients and secure premium opportunities.</p>
            <button class="action-btn btn-green">Continue as Worker</button>
        </div>
    </div>
</div>

<script>
    /**
     * Logic to handle role selection and routing.
     * This correctly targets your sub-folders: /public/employer/ and /public/worker/
     */
    function selectRole(role) {
        // Persist selection for global use
        localStorage.setItem('userRole', role);
        
        // Navigation based on folder architecture
        if (role === 'employer') {
            window.location.href = './employer/signup.html';
        } else {
            window.location.href = './worker/signup.html';
        }
    }
</script>


    <script src="js/i18n.js"></script>
</body>
</html>
