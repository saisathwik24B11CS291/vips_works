<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Signup | Join the Network</title>
    <link rel="stylesheet" href="../css/premium-nav.css">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #111111;
            --accent-blue: #5d3bf6; 
            --text-gray: #94a3b8;
            --border-color: #222222;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); color: white;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .top-auth-link { position: fixed; top: 18px; right: 18px; color: white; background: #111; border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 14px; text-decoration: none; font-weight: 800; font-size: 13px; }

        .auth-card {
            width: 100%; max-width: 400px; padding: 40px 20px;
            text-align: center;
        }

        .logo-circle {
            width: 60px; height: 60px; background: var(--accent-blue);
            border-radius: 15px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        h2 { margin: 0 0 10px; font-size: 24px; }
        p { color: var(--text-gray); font-size: 14px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        .input-group input, .input-group select {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 14px; border-radius: 12px; color: white; font-size: 14px;
            box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-blue); }

        .signup-btn {
            width: 100%; background: linear-gradient(135deg, #22c55e, #10b981); color: white;
            border: none; padding: 15px; border-radius: 12px;
            font-weight: bold; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(34,197,94,0.2);
        }
        .signup-btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .footer-link { margin-top: 25px; font-size: 14px; color: var(--text-gray); }
        .footer-link a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }
        #message { min-height: 20px; margin: 15px 0 0; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
<a href="home.html" class="top-auth-link" id="dashboard-link">Dashboard</a>

<div class="auth-card">
    <div class="logo-circle">E</div>
    <h2>Create Business Account</h2>
    <p>Find and select the best workers for your projects.</p>

    <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="input-group">
            <label>Choose Username</label>
            <input type="text" id="username" placeholder="Choose username" autocomplete="username" required>
        </div>

        

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@business.com" autocomplete="email" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 XXXX XXX XXX" autocomplete="tel" required>
        </div>

        <div class="input-group">
            <label>Create Password</label>
            <input type="password" id="password" placeholder="" autocomplete="new-password" required>
        </div>

        <button type="submit" class="signup-btn">Get Started</button>
    </form>
    <p id="message"></p>

    <div class="footer-link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script>
    document.getElementById('dashboard-link').href = localStorage.getItem('userRole') === 'worker' ? '../worker/profile.html' : 'home.html';

    async function handleSignup(event) {
    event.preventDefault();

    const usernameEl = document.getElementById('username');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const phoneEl = document.getElementById('phone');
    const messageEl = document.getElementById('message');
    const submitBtn = document.querySelector('.signup-btn');

    messageEl.style.color = '#94a3b8';
    messageEl.textContent = 'Creating account...';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating Account...';

    const signupData = {
        role: 'employer',
        username: usernameEl.value.trim(),
        email: emailEl.value.trim(),
        password: passwordEl.value,
        phone: phoneEl.value.trim(),
        // CRITICAL: This key MUST match 'businessCategory' in your server.js route
        businessCategory: "General Business"
    };

    if (!signupData.username || !signupData.email || !signupData.password || !signupData.phone) {
        messageEl.style.color = '#ef4444';
        messageEl.textContent = 'Please fill in all fields.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Get Started';
        return;
    }

    try {
        const response = await fetch(window.location.origin + "/api/auth/signup", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signupData)
        });

        const result = await response.json();

        if (response.ok) {
            messageEl.style.color = '#22c55e';
            messageEl.textContent = result.message || "OTP sent. Opening verification...";
            sessionStorage.setItem('signupVerification', JSON.stringify({
                signupToken: result.signupToken,
                email: result.email,
                maskedEmail: result.maskedEmail,
                role: result.role || 'employer'
            }));
            setTimeout(() => {
                window.location.href = '../auth/signup-verify.html';
            }, 1500);
        } else {
            messageEl.style.color = '#ef4444';
            messageEl.textContent = result.error || result.message || "Signup failed";
            submitBtn.disabled = false;
            submitBtn.textContent = 'Get Started';
        }
    } catch (error) {
        console.error("Network Error:", error);
        messageEl.style.color = '#ef4444';
        messageEl.textContent = "Connection Error: Is your server running?";
        submitBtn.disabled = false;
        submitBtn.textContent = 'Get Started';
    }
}
</script>

    <script src="../js/i18n.js"></script>
    <script src="../js/premium-nav.js"></script>
</body>
</html>
