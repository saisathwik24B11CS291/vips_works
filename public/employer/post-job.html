<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Part-Time Job</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #121212;
            --accent-green: #00f076;
            --input-bg: #1a1a1a;
            --text-gray: #a8a8a8;
            --border: #262626;
        }

        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark); color: white; padding: 15px;
        }

        .post-container { max-width: 500px; margin: 0 auto; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .post-header i { color: var(--accent-green); font-size: 24px; }
        .post-header h2 { font-size: 20px; color: var(--accent-green); margin: 0; }
        .subtitle { font-size: 12px; color: var(--text-gray); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; color: #0095f6; font-size: 13px; font-weight: 600; }
        
        input, textarea {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; color: white; box-sizing: border-box;
            font-size: 14px; outline: none;
        }

        .btn-row { display: flex; gap: 10px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-cancel { background: #262626; color: white; }
        .btn-post { background: var(--accent-green); color: black; }
        select{
width:100%;
background:#1a1a1a;
border:1px solid #262626;
border-radius:8px;
padding:12px;
color:white;
font-size:14px;
outline:none;
}
    </style>
</head>
<body>
    <div class="post-container">
        <div class="post-header"><i class="fas fa-briefcase"></i><h2>Post a Part-Time Job</h2></div>
        <p class="subtitle">Create a job posting to find skilled workers for your project</p>

        <form id="job-form">
            <div class="form-group">
                <div class="label-row"><i class="far fa-file-alt"></i> Project Title</div>
                <input type="text" id="title" placeholder="e.g., Need Electrician for Home Wiring" required>
            </div>
            <div class="form-group">
<div class="label-row"><i class="fas fa-map-marker-alt"></i> Job Location</div>

<select id="location" required>

<option value="">Select Location</option>
<option value="Mumbai">Mumbai</option>
<option value="Delhi">Delhi</option>
<option value="Bangalore">Bangalore</option>
<option value="Hyderabad">Hyderabad</option>
<option value="Rajamahendravaram">Rajamahendravaram</option>

</select>

</div>
            <div class="form-group">
                <div class="label-row"><i class="far fa-file-alt"></i> Project Details</div>
                <textarea id="details" rows="4" placeholder="Describe your project in detail..." required></textarea>
            </div>
            <div class="form-group">
                <div class="label-row"><i class="fas fa-dollar-sign"></i> Hourly Fee ()</div>
                <input type="number" id="hourly" placeholder="e.g., 500">
            </div>
            <div class="form-group">
                <div class="label-row"><i class="fas fa-dollar-sign"></i> Total Fee ()</div>
                <input type="number" id="total" placeholder="e.g., 5000" required>
            </div>
            <div class="form-group">
                <div class="label-row"><i class="far fa-clock"></i> How Many Hours to Work</div>
                <input type="text" id="hours" placeholder="e.g., 8 hours" required>
            </div>
            <div class="form-group">
                <div class="label-row"><i class="fas fa-briefcase"></i> Work Details</div>
                <textarea id="workDetails" rows="3" placeholder="Specific requirements and conditions..."></textarea>
            </div>
            <div class="form-group">
                <div class="label-row"><i class="far fa-dot-circle"></i> What to Do</div>
                <textarea id="tasks" rows="3" placeholder="List the tasks and responsibilities..."></textarea>
            </div>

            <div class="btn-row">
                <button type="button" class="btn btn-cancel" onclick="window.history.back()">Cancel</button>
                <button type="submit" class="btn btn-post" id="submit-btn"><i class="fas fa-plus"></i> Post Job</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('job-form').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const token = localStorage.getItem('token');
            btn.innerText = "Posting...";
            btn.disabled = true;

           const jobData = {
title: document.getElementById('title').value,
details: document.getElementById('details').value,
hourlyFee: document.getElementById('hourly').value,
totalFee: document.getElementById('total').value,
hours: document.getElementById('hours').value,
workDetails: document.getElementById('workDetails').value,
tasks: document.getElementById('tasks').value,
location: document.getElementById('location').value
};

            try {
                const response = await fetch(window.location.origin + "/api/jobs/create", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(jobData)
                });
                const result = await response.json().catch(()=>({}));
                if (response.ok) { alert("Job Posted!"); window.location.href = 'home.html'; }
                else { alert(result.message || "Failed to post job."); }
            } catch (err) { alert(" Server connection error."); }
            finally { btn.innerText = "Post Job"; btn.disabled = false; }
        };
    </script>

    <script src="../js/i18n.js"></script>
</body>
</html>
