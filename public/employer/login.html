<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg-dark: #000; --card-bg: #111; --accent-blue: #3b82f6; --text-gray: #94a3b8; --border-color: #222; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .logo-circle { width: 60px; height: 60px; background: var(--accent-blue); border-radius: 15px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: var(--text-gray); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        .input-group input { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
    +
</head>
<body>

<div class="auth-card">
    <div class="logo-circle">E</div>
    <h2>Welcome Back</h2>
    <p>Login to manage your workers and projects.</p>

    <form id="login-form">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Your Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">Login to Dashboard</button>
    </form>

    <div style="margin-top: 20px;">
        <a id="forgot-toggle" href="javascript:void(0)" style="color: var(--text-gray); font-size: 13px; text-decoration: none;">Forgot Password?</a>
    </div>

    <div id="forgot-panel" style="display:none; margin-top:16px; border:1px solid var(--border-color); padding:12px; border-radius:12px; text-align:left;">
        <div class="input-group" style="margin-bottom:12px;">
            <label>Email</label>
            <input type="email" id="fp-email" placeholder="you@email.com">
        </div>
        <button id="send-code-btn" type="button" class="login-btn" style="background:#111;border:1px solid var(--border-color);margin-bottom:10px;">Send code</button>
        <div class="input-group" style="margin-bottom:12px;">
            <label>Code</label>
            <input type="text" id="fp-code" placeholder="6-digit code">
        </div>
        <div class="input-group" style="margin-bottom:12px;">
            <label>New Password</label>
            <input type="password" id="fp-newpass" placeholder="New password">
        </div>
        <button id="reset-btn" type="button" class="login-btn" style="background:#0f172a;">Reset password</button>
    </div>

    <div style="margin-top:16px;">
        <div id="google-btn" style="width:100%;"></div>
    </div>

    <div style="margin-top: 25px; font-size: 14px; color: var(--text-gray);">
        Don't have an account? <a href="signup.html" style="color: var(--accent-blue); text-decoration: none; font-weight: bold;">Signup</a>
    </div>
</div>

<script>
    document.getElementById('login-form').onsubmit = async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const btn = document.querySelector('.login-btn');

        btn.innerText = "Authenticating...";

        try {
            const response = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Ensure we only allow the correct role to enter this dashboard
                if (data.role !== 'employer') {
                    alert("Access Denied: This account is not an Employer.");
                    return;
                }

                // --- CRITICAL STORAGE ---
                // Clear any old, broken tokens first
                localStorage.clear(); 
                
                // Store the new token
                localStorage.setItem('token', data.token);
                localStorage.setItem('userRole', data.role);
                // Standardize the ID storage
                localStorage.setItem('userId', data.userId || data._id);

                // Redirect to the home dashboard
                window.location.href = 'home.html';
            } else {
                alert(data.message || "Invalid Username or Password.");
            }
        } catch (err) {
            console.error("Login Error:", err);
            alert("Server connection failed. Is your backend running on Port 5000?");
        } finally {
            btn.innerText = "Login to Dashboard";
        }
    };

    // Forgot password flow
    const forgotToggle = document.getElementById('forgot-toggle');
    const forgotPanel = document.getElementById('forgot-panel');
    const sendCodeBtn = document.getElementById('send-code-btn');
    const resetBtn = document.getElementById('reset-btn');
    const googleBtnContainer = document.getElementById('google-btn');
    const API_BASE = "http://localhost:5000";

    forgotToggle.onclick = ()=> forgotPanel.style.display = forgotPanel.style.display==='none'?'block':'none';

    sendCodeBtn.onclick = async ()=>{
        const email = document.getElementById('fp-email').value.trim();
        if(!email) return alert('Enter email');
        sendCodeBtn.disabled = true; sendCodeBtn.innerText = 'Sending...';
        try{
            const res = await fetch(`${API_BASE}/api/auth/forgot`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            alert(data.message || (res.ok ? 'Code sent' : 'Failed'));
        }catch(e){ alert('Network error'); }
        sendCodeBtn.disabled = false; sendCodeBtn.innerText = 'Send code';
    };

    resetBtn.onclick = async ()=>{
        const email = document.getElementById('fp-email').value.trim();
        const code = document.getElementById('fp-code').value.trim();
        const newPassword = document.getElementById('fp-newpass').value.trim();
        if(!email || !code || !newPassword) return alert('Fill all fields');
        resetBtn.disabled = true; resetBtn.innerText = 'Resetting...';
        try{
            const res = await fetch(`${API_BASE}/api/auth/reset`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ email, code, newPassword })
            });
            const data = await res.json();
            alert(data.message || (res.ok ? 'Password reset' : 'Failed'));
        }catch(e){ alert('Network error'); }
        resetBtn.disabled = false; resetBtn.innerText = 'Reset password';
    };

    async function getGoogleClientId(){
        if(window.__googleClientId) return window.__googleClientId;
        try{
            const res = await fetch(`${API_BASE}/api/config/google-client`);
            const data = await res.json();
            if(res.ok && data.clientId){
                window.__googleClientId = data.clientId;
                return data.clientId;
            }
        }catch(err){
            console.error('Google client fetch failed', err);
        }
        return null;
    }

    function waitForGoogleSdk(timeoutMs = 5000){
        return new Promise((resolve, reject)=>{
            const start = Date.now();
            const tick = ()=>{
                if(window.google?.accounts?.id){ return resolve(); }
                if(Date.now() - start > timeoutMs) return reject(new Error('Google SDK not loaded'));
                setTimeout(tick, 50);
            };
            tick();
        });
    }

    // Google sign-in via GIS
    async function initGoogle(){
        const clientId = await getGoogleClientId();
        if(!clientId){
            googleBtnContainer.innerHTML = '<small style=\"color:#ef4444\">Google login unavailable (set GOOGLE_CLIENT_ID)</small>';
            return;
        }
        try{
            await waitForGoogleSdk();
        }catch(err){
            googleBtnContainer.innerHTML = '<small style=\"color:#ef4444\">Google script failed to load</small>';
            return;
        }
        google.accounts.id.initialize({
            client_id: clientId,
            callback: handleCredentialResponse
        });
        google.accounts.id.renderButton(
            googleBtnContainer,
            { theme:'outline', size:'large', width: 280, shape:'pill', text:'continue_with' }
        );
        google.accounts.id.prompt();
    }

    async function handleCredentialResponse(resp){
        try{
            const res = await fetch(`${API_BASE}/api/auth/google`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ idToken: resp.credential, role:'employer' })
            });
            const data = await res.json();
            if(res.ok){
                localStorage.clear();
                localStorage.setItem('token', data.token);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userId', data.userId);
                window.location.href = 'home.html';
            }else{
                alert(data.message || 'Google login failed');
            }
        }catch(e){ alert('Network error'); }
    }

    window.onload = ()=>{ initGoogle(); };
</script>

</body>
</html>
