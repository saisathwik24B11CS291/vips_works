<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications | VIPs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--bg:#000;--card:#121212;--line:#262626;--text:#fff;--muted:#94a3b8;--blue:#3b82f6;--green:#22c55e;--red:#ef4444}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text);padding:18px 18px 78px}
    .shell{max-width:680px;margin:0 auto}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .back{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:#111;color:white;cursor:pointer}
    h1{font-size:22px;margin:0}
    .badge{background:#111827;border:1px solid #1f2937;color:#cbd5e1;border-radius:999px;padding:7px 11px;font-size:12px}
    .list{display:grid;gap:12px}
    .card{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
    .card.unread{border-color:#1d4ed8;background:#0b1426}
    .icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#1f2937;color:#93c5fd;flex:0 0 auto}
    .icon.invite_sent{background:#052e16;color:#86efac}.icon.invite_cancelled{background:#3b0a0a;color:#fca5a5}
    .content{flex:1;min-width:0}
    .title{font-weight:800;margin-bottom:4px}
    .message{color:#cbd5e1;font-size:14px;line-height:1.45}
    .date{color:var(--muted);font-size:12px;margin-top:8px}
    .empty{border:1px dashed var(--line);border-radius:14px;padding:34px;text-align:center;color:var(--muted)}
    .action{margin-top:10px;display:inline-flex;align-items:center;gap:8px;border:1px solid #334155;background:#111827;color:white;border-radius:10px;padding:8px 10px;text-decoration:none;font-size:13px}
    .bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:64px;background:#000;border-top:1px solid #262626;display:flex;justify-content:space-around;align-items:center}
    .nav-item{color:#737373;text-decoration:none;font-size:22px}.nav-item.active{color:white}
  </style>
</head>
<body>
  <main class="shell">
    <div class="header">
      <button class="back" onclick="history.back()" aria-label="Back"><i class="fas fa-arrow-left"></i></button>
      <h1>Notifications</h1>
      <span class="badge" id="count-badge">0</span>
    </div>
    <section class="list" id="list"><div class="empty">Loading notifications...</div></section>
  </main>

  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><i class="fas fa-home"></i></a>
    <a href="../search.html" class="nav-item"><i class="fas fa-search"></i></a>
    <a href="messages.html" class="nav-item"><i class="far fa-paper-plane"></i></a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i></a>
  </nav>

  <script>
    const API_BASE = window.location.origin;
    const token = localStorage.getItem('token');
    const list = document.getElementById('list');
    const esc = value => String(value || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function iconFor(type){
      if(type === 'invite_sent') return 'fa-envelope-open-text';
      if(type === 'invite_cancelled') return 'fa-ban';
      if(type === 'accept') return 'fa-circle-check';
      if(type === 'request') return 'fa-user-plus';
      return 'fa-bell';
    }

    function fallbackMessage(item){
      const actor = item.user?.companyName || item.user?.username || 'Someone';
      if(item.type === 'invite_sent') return `${actor} has invited you.`;
      if(item.type === 'invite_cancelled') return `${actor} cancelled the invitation.`;
      if(item.type === 'accept') return `${actor} accepted your request.`;
      if(item.type === 'request') return `${actor} sent you a follow request.`;
      if(item.type === 'follow') return `${actor} started following you.`;
      return item.message || 'You have a new notification.';
    }

    async function loadNotifications(){
      if(!token || localStorage.getItem('userRole') !== 'worker'){
        window.location.href = 'login.html';
        return;
      }
      try{
        const res = await fetch(`${API_BASE}/api/notifications`, {headers:{'Authorization':`Bearer ${token}`}});
        const data = await res.json();
        if(!res.ok) throw new Error(data.message || 'Failed to load notifications');
        render(Array.isArray(data) ? data : []);
        await fetch(`${API_BASE}/api/notifications/mark-read`, {method:'POST',headers:{'Authorization':`Bearer ${token}`}});
      }catch(err){
        console.error(err);
        list.innerHTML = '<div class="empty">Could not load notifications right now.</div>';
      }
    }

    function render(items){
      const unread = items.filter(item => !item.read).length;
      document.getElementById('count-badge').innerText = unread ? `${unread} unread` : 'All read';
      if(!items.length){
        list.innerHTML = '<div class="empty">No notifications yet.</div>';
        return;
      }
      list.innerHTML = items.map(item => {
        const type = item.type || 'notification';
        const link = item.link || (type.startsWith('invite') ? 'home.html' : '');
        const date = item.date ? new Date(item.date).toLocaleString() : '';
        return `<article class="card ${item.read ? '' : 'unread'}">
          <div class="icon ${esc(type)}"><i class="fas ${iconFor(type)}"></i></div>
          <div class="content">
            <div class="title">${labelFor(type)}</div>
            <div class="message">${esc(item.message || fallbackMessage(item))}</div>
            <div class="date">${esc(date)}</div>
            ${link ? `<a class="action" href="${esc(link)}"><i class="fas fa-arrow-right"></i> Open</a>` : ''}
          </div>
        </article>`;
      }).join('');
    }

    function labelFor(type){
      return ({
        invite_sent: 'Invitation Sent',
        invite_cancelled: 'Invitation Cancelled',
        accept: 'Request Accepted',
        request: 'Follow Request',
        follow: 'New Follower'
      })[type] || 'Notification';
    }

    loadNotifications();
  </script>
  <script src="../js/i18n.js"></script>
</body>
</html>
