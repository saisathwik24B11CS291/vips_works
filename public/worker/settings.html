<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        :root {
            --bg: #05070d;
            --card: #111827;
            --card-soft: #0d1117;
            --text: #f8fafc;
            --gray: #94a3b8;
            --border: #1f2937;
            --accent: #22c55e;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% -10%, rgba(34,197,94,0.14), transparent 34%), var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 640px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .back-btn {
            width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text); font-size: 20px; border-radius: 12px;
            background: var(--card); border: 1px solid var(--border);
        }
        h2 { margin: 0; font-size: 24px; }
        .group-title {
            color: var(--gray); text-transform: uppercase; letter-spacing: 1px;
            font-size: 11px; font-weight: 800; margin: 22px 4px 8px;
        }
        .settings-group {
            background: rgba(17,24,39,0.92);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 42px rgba(0,0,0,0.28);
        }
        .settings-row {
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid var(--border);
        }
        .settings-row:last-child { border-bottom: none; }
        .row-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .icon-box {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(34,197,94,0.12);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); flex: 0 0 auto; font-weight: 800;
        }
        .row-label { font-weight: 700; display: block; }
        .row-info { color: var(--gray); font-size: 12px; margin-top: 3px; display: block; line-height: 1.35; }
        .language-select {
            width: min(230px, 46vw);
            background: var(--card-soft);
            color: var(--text);
            border: 1px solid #263244;
            border-radius: 12px;
            padding: 11px 12px;
            outline: none;
            font-weight: 700;
        }
        .menu-link {
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            transition: background .2s ease;
        }
        .menu-link:hover { background: rgba(255,255,255,0.03); }
        .logout-row {
            color: var(--danger);
            background: rgba(239,68,68,0.08);
            cursor: pointer;
        }
        .logout-row .icon-box {
            color: var(--danger);
            background: rgba(239,68,68,0.12);
        }
        #toast {
            position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
            background: var(--accent); color: #04110a; font-weight: 800;
            padding: 11px 18px; border-radius: 999px; display: none;
            box-shadow: 0 14px 34px rgba(34,197,94,0.24);
        }
        @media (max-width: 520px) {
            body { padding: 16px; }
            .settings-row { align-items: flex-start; flex-direction: column; }
            .language-select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="profile.html" class="back-btn" aria-label="Back">&#8592;</a>
            <h2>Settings</h2>
        </div>

        <div class="group-title">Preferences</div>
        <div class="settings-group">
            <div class="settings-row">
                <div class="row-left">
                    <div class="icon-box">A</div>
                    <div>
                        <span class="row-label">App Language</span>
                        <span class="row-info">Choose the language used across VIPs.</span>
                    </div>
                </div>
                <select id="language-select" class="language-select" data-language-select aria-label="Select Language"></select>
            </div>
            <div class="settings-row menu-link" style="opacity:.65;">
                <div class="row-left">
                    <div class="icon-box">!</div>
                    <div>
                        <span class="row-label">Notifications (Soon)</span>
                        <span class="row-info">Push Notifications</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="group-title">Account</div>
        <div class="settings-group">
            <div class="settings-row logout-row" onclick="logout()">
                <div class="row-left">
                    <div class="icon-box">&#8635;</div>
                    <span class="row-label">Logout</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">Language updated</div>

    <script src="../js/i18n.js"></script>
    <script>
        const toast = document.getElementById('toast');

        function showToast(msg) {
            toast.innerText = window.VipsI18n ? window.VipsI18n.translate(msg) : msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1800);
        }

        window.addEventListener('vips:languagechange', () => showToast('Language updated'));

        function logout() {
            const message = window.VipsI18n ? window.VipsI18n.translate("Are you sure you want to logout?") : "Are you sure you want to logout?";
            if(confirm(message)) {
                localStorage.clear();
                window.history.replaceState(null, null, 'login.html');
                for (let i = 0; i < 10; i++) {
                    window.history.pushState(null, null, 'login.html');
                }
                window.onpopstate = () => {
                    window.location.replace('login.html');
                };
                window.location.replace("login.html");
            }
        }
    </script>
</body>
</html>
