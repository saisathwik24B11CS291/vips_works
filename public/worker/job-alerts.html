<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Updates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root{
            --bg:#05070d;
            --card:#0f172a;
            --border:#1f2937;
            --text:#e5e7eb;
            --muted:#9ca3af;
            --accent:#22c55e;
            --danger:#ef4444;
        }
        body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:20px;}
        .header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
        .back-btn{color:var(--text);text-decoration:none;font-size:22px;padding:8px 12px;border:1px solid var(--border);border-radius:10px;}
        h1{margin:0;font-size:20px;}
        .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}
        .avatar{width:48px;height:48px;border-radius:12px;object-fit:cover;background:#111;border:1px solid #1f2937;cursor:pointer;}
        .meta{color:var(--muted);font-size:12px;margin:3px 0;}
        .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;border:1px solid var(--border);margin-top:6px;}
        .pill.accepted{background:#0b2e1a;color:#7ef2b9;border-color:#1f6f3b;}
        .pill.rejected{background:#3a0f0f;color:#fca5a5;border-color:#7f1d1d;}
        .pill.cancelled{background:#374151;color:#cbd5e1;border-color:#475569;}
        .empty{color:var(--muted);text-align:center;margin-top:60px;}
        .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
        .btn{padding:8px 12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
        .btn.ghost{background:#0b1220;color:var(--text);border:1px solid var(--border);}
        .btn.danger{background:#3a0f0f;color:#fca5a5;border:1px solid #7f1d1d;}
    </style>
</head>
<body>
    <div class="header">
        <a href="home.html" class="back-btn">&larr;</a>
        <h1>Job Updates</h1>
    </div>

    <div id="updates-list"><p class="empty">Loading updates...</p></div>

    <div id="job-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;z-index:4000;">
        <div style="background:#0b1220;border:1px solid #1f2937;border-radius:14px;padding:18px;width:90%;max-width:420px;color:var(--text);">
            <h2 id="modal-title" style="margin:0 0 6px 0;font-size:18px;"></h2>
            <p id="modal-loc" class="meta"></p>
            <p id="modal-pay" class="meta"></p>
            <p id="modal-details" style="font-size:14px;line-height:1.5;"></p>
            <p id="modal-tasks" style="font-size:13px;color:var(--muted);"></p>
            <div style="text-align:right;margin-top:10px;">
                <button class="btn ghost" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000";
        const token = localStorage.getItem('token');

        let updatesCache = [];

        function render(updates){
            updatesCache = updates || [];
            const wrap = document.getElementById('updates-list');
            if(!updates || !updates.length){
                wrap.innerHTML = '<p class="empty">No updates yet.</p>';
                return;
            }
            wrap.innerHTML = updates.map(up=>{
                const accepted = up.status === 'accepted';
                const cancelled = up.status === 'withdrawn';
                const pillClass = accepted ? 'accepted' : (cancelled ? 'cancelled' : 'rejected');
                const pillText = accepted ? 'Accepted' : (cancelled ? 'Cancelled' : 'Rejected');
                const msg = accepted ? 'You have been accepted for this job.' : (cancelled ? 'You cancelled this application.' : 'Your application was rejected.');
                const empImg = up.employerId?.profilePicture ? `${API_BASE}${up.employerId.profilePicture}` : 'https://via.placeholder.com/48';
                return `
                    <div class="card">
                        <img class="avatar" src="${empImg}" onclick="openEmployer('${up.employerId?._id||''}')" />
                        <div>
                            <p style="margin:0;font-size:15px;font-weight:700;cursor:pointer;" onclick="openJob('${up._id}')">${up.jobId?.title || 'Job'} <span class="pill ${pillClass}">${pillText}</span></p>
                            <p class="meta"><i class="fas fa-building"></i> ${up.employerId?.companyName || up.employerId?.username || 'Employer'}</p>
                            <p class="meta"><i class="fas fa-location-dot"></i> ${up.jobId?.location || up.employerId?.location || 'Location not set'}</p>
                            <p class="meta">${msg}</p>
                            <div class="actions">
                                ${cancelled ? `<button class="btn ghost" onclick="removeCard('${up._id}')">Delete</button>` :
                                    accepted ? `<button class="btn ghost" onclick="cancelApp('${up.jobId?._id||''}','${up._id}')">Cancel</button>` :
                                    `<button class="btn ghost" onclick="removeCard('${up._id}')">Delete</button>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function loadUpdates(){
            if(!token){
                window.location.href = '../login.html';
                return;
            }
            try{
                const res = await fetch(`${API_BASE}/api/worker/job-updates`,{
                    headers:{'Authorization':`Bearer ${token}`}
                });
                const data = res.ok ? await res.json() : [];
                render(data);
                await fetch(`${API_BASE}/api/worker/job-updates/mark-read`,{
                    method:'POST',
                    headers:{'Authorization':`Bearer ${token}`}
                });
            }catch(err){
                document.getElementById('updates-list').innerHTML = '<p class="empty">Unable to load updates.</p>';
                console.error(err);
            }
        }
        function openEmployer(id){
            if(!id) return;
            window.location.href = `../friendProfile.html?id=${id}`;
        }
        function openJob(updateId){
            const up = updatesCache.find(u=>u._id===updateId);
            if(!up) return;
            document.getElementById('modal-title').innerText = up.jobId?.title || 'Job';
            document.getElementById('modal-loc').innerText = `Location: ${up.jobId?.location || up.employerId?.location || 'Not set'}`;
            const pay = up.jobId?.totalFee ? `₹${up.jobId.totalFee}` : (up.jobId?.hourlyFee ? `₹${up.jobId.hourlyFee}/hr` : 'Budget not set');
            document.getElementById('modal-pay').innerText = `Pay: ${pay}`;
            document.getElementById('modal-details').innerText = up.jobId?.details || up.jobId?.workDetails || 'No details provided.';
            document.getElementById('modal-tasks').innerText = up.jobId?.tasks ? `Tasks: ${up.jobId.tasks}` : '';
            document.getElementById('job-modal').style.display = 'flex';
        }
        function closeModal(){
            document.getElementById('job-modal').style.display = 'none';
        }
        async function cancelApp(jobId, updateId){
            if(!jobId) return;
            if(!confirm('Cancel your application for this job?')) return;
            try{
                await fetch(`${API_BASE}/api/jobs/apply/${jobId}`,{
                    method:'DELETE',
                    headers:{'Authorization':`Bearer ${token}`}
                });
                // reflect locally as cancelled
                updatesCache = updatesCache.map(u=> u._id===updateId ? {...u, status:'withdrawn'} : u);
                render(updatesCache);
            }catch(err){
                alert('Failed to cancel');
            }
        }
        function removeCard(id){
            updatesCache = (updatesCache||[]).filter(u=>u._id!==id);
            render(updatesCache);
        }
        loadUpdates();
    </script>
</body>
</html>
