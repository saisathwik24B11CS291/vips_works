<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Jobs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --blue: #3b82f6; --green: #10b981; --border: #262626; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 70px; }
        .job-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 15px; padding: 15px; margin-bottom: 15px; 
        }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .job-title { font-size: 18px; font-weight: bold; color: var(--blue); margin: 0; }
        .fee-tag { background: rgba(16, 185, 129, 0.1); color: var(--green); padding: 5px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .details { font-size: 13px; color: #94a3b8; margin: 10px 0; line-height: 1.4; }
        .meta { display: flex; gap: 15px; font-size: 12px; color: #64748b; }
        .apply-btn { 
            width: 100%; background: var(--blue); color: white; border: none; 
            padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <h2 style="font-size: 22px;">Explore Jobs</h2>
    <div id="job-container">
        <p style="text-align: center; color: #444;">Searching for available work...</p>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadJobs() {
            try {
                const res = await fetch(`${API_BASE}/api/jobs/feed`);
                const jobs = await res.json();
                const container = document.getElementById('job-container');
                container.innerHTML = "";

                if (jobs.length === 0) {
                    container.innerHTML = `<p style="text-align:center; margin-top:50px;">No jobs available right now.</p>`;
                    return;
                }

                jobs.forEach(job => {
                    const employerName = job.employerId?.companyName || job.employerId?.username || "Employer";
                    container.innerHTML += `
                        <div class="job-card">
                            <div class="job-header">
                                <p class="job-title">${job.title}</p>
                                <span class="fee-tag">₹${job.totalFee}</span>
                            </div>
                            <p style="font-size:12px; color:#60a5fa; margin:5px 0;">By ${employerName}</p>
                            <p class="details">${job.details.substring(0, 100)}...</p>
                            <div class="meta">
                                <span><i class="far fa-clock"></i> ${job.hours}</span>
                                <span><i class="fas fa-map-marker-alt"></i> Task-based</span>
                            </div>
                            <button class="apply-btn" onclick="viewJob('${job._id}')">View Details & Apply</button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Feed error:", err);
            }
        }

        function viewJob(id) { window.location.href = `job-details.html?id=${id}`; }
        window.onload = loadJobs;
    </script>
</body>
</html>
